<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="55%" stop-color="#151B3B"/>
      <stop offset="100%" stop-color="#1E1245"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F8FFF"/>
      <stop offset="50%" stop-color="#9D4EDD"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F8FFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4F8FFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glass"><feGaussianBlur stdDeviation="0.6"/></filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <circle cx="220" cy="90" r="140" fill="url(#glow)" filter="url(#blur1)">
    <animate attributeName="r" values="120;150;120" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="980" cy="230" r="160" fill="url(#glow)" filter="url(#blur1)" opacity="0.7">
    <animate attributeName="r" values="140;170;140" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- neural network nodes + connecting lines -->
  <g stroke="#4F8FFF" stroke-width="1" opacity="0.35">
    <line x1="80" y1="60" x2="220" y2="120"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3s" repeatCount="indefinite"/></line>
    <line x1="220" y1="120" x2="150" y2="220"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="4s" repeatCount="indefinite"/></line>
    <line x1="220" y1="120" x2="340" y2="70"><animate attributeName="opacity" values="0.2;0.55;0.2" dur="3.5s" repeatCount="indefinite"/></line>
    <line x1="340" y1="70" x2="420" y2="180"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5s" repeatCount="indefinite"/></line>
    <line x1="150" y1="220" x2="60" y2="180"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="4.5s" repeatCount="indefinite"/></line>
    <line x1="850" y1="60" x2="960" y2="130"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.2s" repeatCount="indefinite"/></line>
    <line x1="960" y1="130" x2="1080" y2="80"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.2s" repeatCount="indefinite"/></line>
    <line x1="960" y1="130" x2="1000" y2="240"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="5.5s" repeatCount="indefinite"/></line>
    <line x1="1000" y1="240" x2="1120" y2="210"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.8s" repeatCount="indefinite"/></line>
  </g>
  <g fill="#00D9FF">
    <circle cx="80" cy="60" r="3"><animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="120" r="4"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="220" r="3"><animate attributeName="r" values="2;4;2" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="70" r="3"><animate attributeName="r" values="2;4;2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="180" r="3"><animate attributeName="r" values="2;4;2" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="180" r="2.5"><animate attributeName="r" values="2;3.5;2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="60" r="3"><animate attributeName="r" values="2;4;2" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="130" r="4"><animate attributeName="r" values="3;5;3" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="80" r="3"><animate attributeName="r" values="2;4;2" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="240" r="3"><animate attributeName="r" values="2;4;2" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="210" r="2.5"><animate attributeName="r" values="2;3.5;2" dur="2.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- glass card behind title -->
  <rect x="260" y="90" width="680" height="140" rx="20" fill="#FFFFFF" opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1" filter="url(#glass)"/>

  <text x="600" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="url(#titleGrad)" letter-spacing="4">UAIPAP</text>
  <text x="600" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#E8ECFF" opacity="0.85">Universal AI Powered Analytics Platform</text>
  <text x="600" y="212" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#9FB0FF" opacity="0.6" letter-spacing="1">Upload &#8226; Clean &#8226; Visualize &#8226; Ask AI &#8226; Export</text>

  <!-- floating drifting particles -->
  <g fill="#9D4EDD" opacity="0.6">
    <circle cx="500" cy="40" r="2">
      <animate attributeName="cy" values="40;60;40" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="270" r="2.5">
      <animate attributeName="cy" values="270;250;270" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="260" r="2">
      <animate attributeName="cy" values="260;280;260" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
